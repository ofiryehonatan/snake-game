<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Will You? 💌</title>
<style>
  :root {
    --pink-1: #ff9a9e;
    --pink-2: #fecfef;
    --pink-3: #ffdde1;
    --heart: #ff477e;
    --yes-1: #6a11cb;
    --yes-2: #2575fc;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(-45deg, var(--pink-1), var(--pink-2), var(--pink-3), #ffb6c1);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: safe center;
    min-height: 100vh;
    position: relative;
    padding: 20px;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Floating background hearts */
  .bg-hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .bg-heart {
    position: absolute;
    bottom: -50px;
    font-size: 24px;
    opacity: 0.6;
    animation: floatUp linear infinite;
    user-select: none;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 0.7;
    }
    100% {
      transform: translateY(-110vh) rotate(360deg);
      opacity: 0;
    }
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 28px;
    padding: 40px 28px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(255, 71, 126, 0.25), inset 0 0 0 1px rgba(255,255,255,0.4);
    animation: popIn 0.7s cubic-bezier(.26,1.4,.5,1);
  }

  @keyframes popIn {
    0% { transform: scale(0.7) translateY(30px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .emoji-top {
    font-size: 54px;
    display: inline-block;
    animation: wiggle 2.2s ease-in-out infinite;
    margin-bottom: 10px;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  h1 {
    font-size: 1.6rem;
    color: #d6336c;
    margin-bottom: 10px;
    line-height: 1.35;
    text-shadow: 0 2px 8px rgba(255,255,255,0.6);
  }

  p.subtitle {
    color: #a5335a;
    font-size: 0.95rem;
    margin-bottom: 30px;
    opacity: 0.85;
  }

  .button-row {
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: center;
    position: relative;
    min-height: 64px;
  }

  button {
    border: none;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 16px 34px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-user-select: none;
    user-select: none;
  }

  #yesBtn {
    background: linear-gradient(135deg, var(--yes-1), var(--yes-2));
    color: #fff;
    box-shadow: 0 10px 25px rgba(37, 117, 252, 0.4);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s ease;
  }

  #yesBtn:active {
    transform: scale(0.93);
  }

  #yesBtn.grow {
    transform: scale(1.15);
    box-shadow: 0 14px 34px rgba(37, 117, 252, 0.55);
  }

  #noBtn {
    background: linear-gradient(135deg, #ff8a8a, #ff5c8a);
    color: #fff;
    box-shadow: 0 8px 20px rgba(255, 92, 138, 0.4);
    position: relative;
    z-index: 2;
  }

  #noBtn.fixed-fly {
    position: fixed;
    transition: top 0.18s ease, left 0.18s ease, transform 0.18s ease;
  }

  /* Success screen */
  .success-screen {
    display: none;
    position: relative;
    z-index: 1;
    text-align: center;
    animation: popIn 0.6s cubic-bezier(.26,1.4,.5,1);
  }

  .success-screen.show {
    display: block;
  }

  .success-screen .big-emoji {
    font-size: 70px;
    animation: bounce 1s ease infinite;
    display: inline-block;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-18px); }
  }

  .success-screen h1 {
    font-size: 1.8rem;
    margin-top: 10px;
  }

  .success-screen p {
    color: #a5335a;
    font-size: 1.05rem;
    margin-top: 14px;
    max-width: 380px;
  }

  .signature {
    position: fixed;
    bottom: 14px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 3;
    font-size: 0.85rem;
    color: #ffffff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.25);
    letter-spacing: 0.3px;
    font-weight: 600;
    pointer-events: none;
  }

  /* Confetti canvas */
  #confettiCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  @media (max-width: 380px) {
    h1 { font-size: 1.35rem; }
    button { padding: 14px 26px; font-size: 1rem; }
    .card { padding: 32px 20px; }
  }
</style>
</head>
<body>

<div class="bg-hearts" id="bgHearts"></div>

<canvas id="confettiCanvas"></canvas>

<div class="card" id="questionCard">
  <div class="emoji-top">💘</div>
  <h1>Hey you... would you like to go on a date with me? 👀</h1>
  <p class="subtitle">Take your time. (But the "No" button is a little shy 😉)</p>
  <div class="button-row">
    <button id="yesBtn" onclick="sayYes()">Yes 💖</button>
    <button id="noBtn" onclick="dodge()">No</button>
  </div>
</div>

<div class="success-screen" id="successScreen">
  <div class="big-emoji">🎉</div>
  <h1>Yay! I knew you couldn't resist my charm 😎</h1>
  <p>It's a date! Get ready — I'm already thinking about what snacks to bring. 🍿💕</p>
</div>

<div class="signature">Custom coded by Ofir 😉</div>

<script>
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const questionCard = document.getElementById('questionCard');
  const successScreen = document.getElementById('successScreen');
  const bgHearts = document.getElementById('bgHearts');

  let dodgeCount = 0;
  const noPhrases = ["No", "Nope!", "Try again", "Nuh-uh", "Nice try", "Almost!", "So close", "Are you sure?", "Really?", "Think again 😏"];

  function moveButtonAway() {
    if (!noBtn.classList.contains('fixed-fly')) {
      // .card has a permanent backdrop-filter, which per spec makes it the
      // containing block for any position:fixed descendant — so the button
      // would be positioned relative to the (smaller, offset) card box
      // instead of the real viewport. Reparent it to <body> first so our
      // viewport-relative math below is actually correct.
      document.body.appendChild(noBtn);
      noBtn.classList.add('fixed-fly');
    }

    // Update the label first so the width/height used below reflects the
    // text that will actually be showing (phrases vary a lot in length,
    // e.g. "No" vs "Are you sure?" — sizing off the old text could push
    // the button past the edge of the screen).
    dodgeCount++;
    noBtn.textContent = noPhrases[(dodgeCount - 1) % noPhrases.length];

    const margin = 12;
    const btnRect = noBtn.getBoundingClientRect();
    // Assume a generous worst-case size (the widest phrase, e.g. "Think
    // again 😏") rather than trusting this instant's measurement alone —
    // emoji glyphs can finish rendering a beat after the text is set,
    // quietly growing the button past a bound sized for the old width.
    const w = Math.max(btnRect.width, 220);
    const h = Math.max(btnRect.height, 70);

    const maxX = Math.max(margin, window.innerWidth - w - margin);
    const maxY = Math.max(margin, window.innerHeight - h - margin);

    const newX = Math.min(maxX, Math.max(margin, Math.random() * maxX));
    const newY = Math.min(maxY, Math.max(margin, Math.random() * maxY));

    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';

    // Yes button grows a bit each time to encourage the inevitable
    const scale = Math.min(1.5, 1 + dodgeCount * 0.05);
    yesBtn.style.transform = `scale(${scale})`;
    yesBtn.classList.add('grow');
  }

  function dodge() {
    moveButtonAway();
  }

  // Desktop: run away on hover too (delayed so the card's entrance animation
  // sweeping the button under an already-resting cursor doesn't trigger a
  // spurious mouseenter before the user actually interacts)
  let hoverDodgeEnabled = false;
  setTimeout(() => { hoverDodgeEnabled = true; }, 800);

  noBtn.addEventListener('mouseenter', function () {
    if (hoverDodgeEnabled) moveButtonAway();
  });
  noBtn.addEventListener('touchstart', function (e) {
    e.preventDefault();
    moveButtonAway();
  }, { passive: false });

  function sayYes() {
    questionCard.style.display = 'none';
    successScreen.classList.add('show');
    launchConfetti();
  }

  // Floating background hearts
  function createFloatingHearts() {
    const emojis = ['💕', '💖', '💗', '💓', '💞', '❤️'];
    setInterval(() => {
      const heart = document.createElement('div');
      heart.className = 'bg-heart';
      heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (16 + Math.random() * 22) + 'px';
      const duration = 6 + Math.random() * 6;
      heart.style.animationDuration = duration + 's';
      bgHearts.appendChild(heart);
      setTimeout(() => heart.remove(), duration * 1000);
    }, 500);
  }
  createFloatingHearts();

  // Confetti
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  let confettiPieces = [];
  let confettiAnimationId = null;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function launchConfetti() {
    const colors = ['#ff477e', '#ff8a8a', '#ffd93d', '#6a11cb', '#2575fc', '#ff5c8a', '#fecfef'];
    confettiPieces = [];
    const count = 160;

    for (let i = 0; i < count; i++) {
      confettiPieces.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.5,
        w: 6 + Math.random() * 6,
        h: 10 + Math.random() * 8,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * 360,
        rotationSpeed: (Math.random() - 0.5) * 10,
        speedY: 2 + Math.random() * 3.5,
        speedX: (Math.random() - 0.5) * 2.5,
        shape: Math.random() > 0.5 ? 'rect' : 'circle'
      });
    }

    if (confettiAnimationId) cancelAnimationFrame(confettiAnimationId);
    animateConfetti();

    // keep sprinkling a bit more for a few seconds
    let bursts = 0;
    const burstInterval = setInterval(() => {
      bursts++;
      for (let i = 0; i < 40; i++) {
        confettiPieces.push({
          x: Math.random() * canvas.width,
          y: -20,
          w: 6 + Math.random() * 6,
          h: 10 + Math.random() * 8,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotationSpeed: (Math.random() - 0.5) * 10,
          speedY: 2 + Math.random() * 3.5,
          speedX: (Math.random() - 0.5) * 2.5,
          shape: Math.random() > 0.5 ? 'rect' : 'circle'
        });
      }
      if (!confettiAnimationId) animateConfetti();
      if (bursts >= 4) clearInterval(burstInterval);
    }, 700);
  }

  function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confettiPieces.forEach(p => {
      p.x += p.speedX;
      p.y += p.speedY;
      p.rotation += p.rotationSpeed;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rotation * Math.PI) / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });

    confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 30);

    if (confettiPieces.length > 0) {
      confettiAnimationId = requestAnimationFrame(animateConfetti);
    } else {
      confettiAnimationId = null;
    }
  }
</script>

</body>
</html>

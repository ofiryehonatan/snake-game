<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#38bdf8">
    <title>Icy Tower</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2447 0%, #1e3c72 50%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            border: 3px solid white;
            background-color: #0b1e3d;
            display: block;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .info {
            display: flex;
            justify-content: space-around;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .score-box, .highscore-box, .combo-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-size: 1.2em;
            border: 2px solid white;
        }

        .score-box span, .highscore-box span, .combo-box span {
            font-weight: bold;
            font-size: 1.5em;
            color: #7dd3fc;
        }

        .controls {
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            color: white;
            border: 2px solid white;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #38bdf8;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .game-over h2 {
            color: #38bdf8;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-over p {
            color: white;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .game-over button {
            margin-top: 20px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .home-link {
            display: block;
            color: #cfe8ff;
            margin-top: 14px;
            font-size: 0.85em;
            text-decoration: none;
        }

        .home-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧊 ICY TOWER</h1>
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div class="info">
            <div class="score-box">Score: <span id="score">0</span></div>
            <div class="highscore-box">Best: <span id="highscore">0</span></div>
            <div class="combo-box">Combo: <span id="combo">x0</span></div>
        </div>

        <div class="button-group">
            <button id="pauseBtn" onclick="togglePause()">Pause</button>
            <button onclick="resetGame()">New Game</button>
        </div>

        <div class="controls">
            <strong>Controls:</strong><br>
            Arrow Keys / A,D to run &nbsp;•&nbsp; Space / W / Up to jump &nbsp;•&nbsp; P to pause<br>
            Build up running speed before you jump to leap higher and skip floors for combo bonuses!
        </div>

        <a class="home-link" href="index.html">&larr; Back to Snake Game</a>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-over" id="gameOverModal">
        <h2>YOU FELL!</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <p>Best Score: <span id="finalHighscore">0</span></p>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        // ---- Tunable physics ----
        const GRAVITY = 0.45;
        const FRICTION = 0.85;
        const RUN_ACCEL = 0.55;
        const MAX_RUN_SPEED = 7.5;
        const JUMP_BASE = -9.5;
        const JUMP_BONUS = -7.5; // extra upward velocity at max run speed
        const GROUND_Y = H - 40;
        const PLAYER_W = 26;
        const PLAYER_H = 34;

        let highScore = parseInt(localStorage.getItem('icyTowerHighScore')) || 0;
        document.getElementById('highscore').textContent = highScore;

        let player, floors, cameraY, keys, gameRunning, gamePaused;
        let heightScore, bonusScore, comboStreak, floatingTexts, snowflakes, floorsGenerated;

        function initSnow() {
            snowflakes = [];
            for (let i = 0; i < 40; i++) {
                snowflakes.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 2 + 1,
                    speed: Math.random() * 0.6 + 0.2
                });
            }
        }

        function resetGame() {
            player = {
                x: W / 2 - PLAYER_W / 2,
                y: GROUND_Y - PLAYER_H,
                vx: 0,
                vy: 0,
                onFloor: true,
                floorIndex: 0,
                facing: 1
            };

            floors = [{ x: 0, y: GROUND_Y, width: W, index: 0 }];
            floorsGenerated = 0;
            generateFloors();

            cameraY = GROUND_Y - H + 60;
            keys = {};
            gameRunning = true;
            gamePaused = false;
            heightScore = 0;
            bonusScore = 0;
            comboStreak = 0;
            floatingTexts = [];
            initSnow();

            document.getElementById('score').textContent = '0';
            document.getElementById('combo').textContent = 'x0';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('gameOverModal').style.display = 'none';
            document.getElementById('pauseBtn').textContent = 'Pause';
        }

        function generateFloors() {
            let last = floors[floors.length - 1];
            while (last.y > cameraYTopBound() - 200) {
                const gap = Math.min(60 + floorsGenerated * 0.5, 135);
                const width = Math.max(210 - floorsGenerated * 0.9, 85);
                const maxReach = 170;
                const prevCenter = last.x + last.width / 2;
                let x = prevCenter + (Math.random() * 2 - 1) * maxReach - width / 2;
                x = Math.max(0, Math.min(W - width, x));
                floorsGenerated++;
                const floor = { x, y: last.y - gap, width, index: floorsGenerated };
                floors.push(floor);
                last = floor;
            }
            // Trim floors far below camera to keep the array small
            while (floors.length > 0 && floors[0].y > cameraY + H + 200) {
                floors.shift();
            }
        }

        function cameraYTopBound() {
            return cameraY;
        }

        function togglePause() {
            if (gameRunning) {
                gamePaused = !gamePaused;
                document.getElementById('pauseBtn').textContent = gamePaused ? 'Resume' : 'Pause';
            }
        }

        function endGame() {
            gameRunning = false;
            const finalScore = heightScore + bonusScore;
            if (finalScore > highScore) {
                highScore = finalScore;
                localStorage.setItem('icyTowerHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = finalScore;
            document.getElementById('finalHighscore').textContent = highScore;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('gameOverModal').style.display = 'block';
        }

        function addFloatingText(text, worldX, worldY, color) {
            floatingTexts.push({ text, x: worldX, y: worldY, life: 60, color: color || '#7dd3fc' });
        }

        function comboLabel(skipped) {
            if (skipped >= 6) return 'GODLIKE!';
            if (skipped >= 5) return 'AWESOME!';
            if (skipped >= 4) return 'SUPER!';
            if (skipped >= 3) return 'COOL!';
            if (skipped >= 2) return 'NICE!';
            return '';
        }

        function update() {
            // Horizontal movement
            if (keys['left']) {
                player.vx -= RUN_ACCEL;
                player.facing = -1;
            } else if (keys['right']) {
                player.vx += RUN_ACCEL;
                player.facing = 1;
            } else {
                player.vx *= FRICTION;
                if (Math.abs(player.vx) < 0.05) player.vx = 0;
            }
            player.vx = Math.max(-MAX_RUN_SPEED, Math.min(MAX_RUN_SPEED, player.vx));

            // Jump
            if (keys['jump'] && player.onFloor) {
                const speedRatio = Math.abs(player.vx) / MAX_RUN_SPEED;
                player.vy = JUMP_BASE + JUMP_BONUS * speedRatio;
                player.vx *= 1.1;
                player.onFloor = false;
            }
            keys['jump'] = false;

            // Gravity
            player.vy += GRAVITY;
            const prevBottom = player.y + PLAYER_H;

            player.x += player.vx;
            player.y += player.vy;

            // Walls
            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x + PLAYER_W > W) { player.x = W - PLAYER_W; player.vx = 0; }

            // Floor collision (only when falling)
            if (player.vy >= 0) {
                const newBottom = player.y + PLAYER_H;
                for (const floor of floors) {
                    const overlapsX = player.x + PLAYER_W > floor.x && player.x < floor.x + floor.width;
                    if (overlapsX && prevBottom <= floor.y && newBottom >= floor.y) {
                        player.y = floor.y - PLAYER_H;
                        player.vy = 0;
                        const wasOnFloor = player.onFloor;
                        player.onFloor = true;

                        if (!wasOnFloor) {
                            const skipped = floor.index - player.floorIndex - 1;
                            if (skipped > 0 && floor.index > player.floorIndex) {
                                comboStreak++;
                                const bonus = skipped * 40 * (1 + comboStreak * 0.15);
                                bonusScore += Math.round(bonus);
                                const label = comboLabel(skipped);
                                if (label) addFloatingText(label, player.x, player.y - 10, '#facc15');
                                addFloatingText('+' + Math.round(bonus), player.x, player.y - 30, '#7dd3fc');
                            } else if (floor.index <= player.floorIndex) {
                                // landed on a lower/same floor after falling back down
                                comboStreak = 0;
                            } else {
                                comboStreak = 0;
                            }
                        }
                        if (floor.index > player.floorIndex) {
                            player.floorIndex = floor.index;
                        }
                        break;
                    }
                }
                if (player.y + PLAYER_H < floors.find(f => f.index === player.floorIndex).y - 1 ||
                    player.x + PLAYER_W < floors.find(f => f.index === player.floorIndex).x ||
                    player.x > floors.find(f => f.index === player.floorIndex).x + floors.find(f => f.index === player.floorIndex).width) {
                    player.onFloor = false;
                }
            } else {
                player.onFloor = false;
            }

            document.getElementById('combo').textContent = 'x' + comboStreak;

            // Camera only ever scrolls upward (toward smaller y)
            const desiredCameraY = player.y - H * 0.55;
            cameraY = Math.min(cameraY, desiredCameraY);

            generateFloors();

            // Height-based score (never decreases)
            const climbed = Math.max(0, Math.floor((GROUND_Y - player.y) / 8));
            heightScore = Math.max(heightScore, climbed);
            document.getElementById('score').textContent = heightScore + bonusScore;

            // Update floating texts
            for (const ft of floatingTexts) {
                ft.y -= 0.6;
                ft.life--;
            }
            floatingTexts = floatingTexts.filter(ft => ft.life > 0);

            // Snow drift
            for (const flake of snowflakes) {
                flake.y += flake.speed;
                if (flake.y > H) { flake.y = 0; flake.x = Math.random() * W; }
            }

            // Death: fell below the visible screen
            if (player.y - cameraY > H + PLAYER_H) {
                endGame();
            }
        }

        function draw() {
            // Sky gradient that cools with height
            const heightFactor = Math.min(1, heightScore / 400);
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, mixColor('#0b1e3d', '#dbeafe', heightFactor));
            g.addColorStop(1, '#0b1e3d');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);

            // Snow
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            for (const flake of snowflakes) {
                ctx.beginPath();
                ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI * 2);
                ctx.fill();
            }

            // Floors
            for (const floor of floors) {
                const sy = floor.y - cameraY;
                if (sy < -20 || sy > H + 20) continue;
                ctx.fillStyle = '#e0f2fe';
                ctx.shadowColor = '#7dd3fc';
                ctx.shadowBlur = 8;
                ctx.fillRect(floor.x, sy, floor.width, 12);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#93c5fd';
                ctx.fillRect(floor.x, sy + 9, floor.width, 3);
            }

            // Player
            const sy = player.y - cameraY;
            ctx.fillStyle = '#f97316';
            ctx.shadowColor = '#fb923c';
            ctx.shadowBlur = 10;
            ctx.fillRect(player.x, sy, PLAYER_W, PLAYER_H);
            ctx.shadowBlur = 0;

            // Face
            ctx.fillStyle = '#1f2937';
            const eyeOffset = player.facing === 1 ? 6 : -6;
            ctx.beginPath();
            ctx.arc(player.x + PLAYER_W / 2 + eyeOffset / 2, sy + 12, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // Floating combo texts
            ctx.textAlign = 'center';
            for (const ft of floatingTexts) {
                ctx.globalAlpha = Math.max(0, ft.life / 60);
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 16px Arial';
                ctx.fillText(ft.text, ft.x + PLAYER_W / 2, ft.y - cameraY);
            }
            ctx.globalAlpha = 1;
        }

        function mixColor(c1, c2, t) {
            const p1 = hexToRgb(c1);
            const p2 = hexToRgb(c2);
            const r = Math.round(p1.r + (p2.r - p1.r) * t);
            const gg = Math.round(p1.g + (p2.g - p1.g) * t);
            const b = Math.round(p1.b + (p2.b - p1.b) * t);
            return `rgb(${r},${gg},${b})`;
        }

        function hexToRgb(hex) {
            const n = parseInt(hex.slice(1), 16);
            return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }

        function gameLoop() {
            if (!gamePaused && gameRunning) {
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'arrowleft':
                case 'a':
                    keys['left'] = true;
                    e.preventDefault();
                    break;
                case 'arrowright':
                case 'd':
                    keys['right'] = true;
                    e.preventDefault();
                    break;
                case 'arrowup':
                case 'w':
                case ' ':
                    keys['jump'] = true;
                    e.preventDefault();
                    break;
                case 'p':
                    togglePause();
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.key.toLowerCase()) {
                case 'arrowleft':
                case 'a':
                    keys['left'] = false;
                    break;
                case 'arrowright':
                case 'd':
                    keys['right'] = false;
                    break;
            }
        });

        resetGame();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>Game Menu - Ofir Yehonatan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: white;
            margin-bottom: 5px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .byline {
            color: white;
            margin-bottom: 30px;
            font-size: 0.9em;
            opacity: 0.85;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-card {
            display: block;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 12px;
            padding: 25px 40px;
            color: white;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .game-card .emoji {
            font-size: 2em;
            display: block;
            margin-bottom: 8px;
        }

        .game-card .name {
            font-size: 1.4em;
            font-weight: bold;
        }

        .game-card .desc {
            font-size: 0.85em;
            opacity: 0.8;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 GAME MENU</h1>
        <div class="byline">by Ofir Yehonatan</div>

        <div class="menu">
            <a class="game-card" href="snake.html">
                <span class="emoji">🐍</span>
                <span class="name">Snake Game</span>
                <div class="desc">Eat food, grow long, don't hit yourself</div>
            </a>

            <a class="game-card" href="icy-tower.html">
                <span class="emoji">🧊</span>
                <span class="name">Icy Tower</span>
                <div class="desc">Jump as high as you can without falling</div>
            </a>

            <a class="game-card" href="miner.html">
                <span class="emoji">⛏️</span>
                <span class="name">Block Miner</span>
                <div class="desc">Platform, mine, and flag your way through a minesweeper-style world</div>
            </a>
        </div>
    </div>
</body>
</html>

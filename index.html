<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            border: 3px solid white;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .info {
            display: flex;
            justify-content: space-around;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .score-box, .highscore-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-size: 1.2em;
            border: 2px solid white;
        }

        .score-box span, .highscore-box span {
            font-weight: bold;
            font-size: 1.5em;
            color: #4fff4f;
        }

        .controls {
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid white;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff6b6b;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .game-over h2 {
            color: #ff6b6b;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-over p {
            color: white;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .game-over button {
            margin-top: 20px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 SNAKE GAME</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="info">
            <div class="score-box">Score: <span id="score">0</span></div>
            <div class="highscore-box">High Score: <span id="highscore">0</span></div>
        </div>

        <div class="button-group">
            <button id="pauseBtn" onclick="togglePause()">Pause</button>
            <button onclick="resetGame()">New Game</button>
        </div>

        <div class="controls">
            <strong>Controls:</strong><br>
            Use Arrow Keys or WASD to move the snake<br>
            Space to pause/resume<br>
            Eat the red food to grow and earn points
        </div>

        <a href="icy-tower.html" style="display:block;color:white;margin-top:14px;font-size:0.85em;text-decoration:none;">Try Icy Tower &rarr;</a>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-over" id="gameOverModal">
        <h2>GAME OVER!</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <p>High Score: <span id="finalHighscore">0</span></p>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = true;
        let gamePaused = false;
        let gameSpeed = 100;

        // Update high score display
        document.getElementById('highscore').textContent = highScore;

        // Game loop
        let lastTime = 0;
        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;

            if (deltaTime > gameSpeed) {
                if (!gamePaused && gameRunning) {
                    update();
                    draw();
                }
                lastTime = currentTime;
            }

            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Update direction
            direction = nextDirection;

            // Calculate new head position
            const head = snake[0];
            const newHead = {
                x: (head.x + direction.x + tileCount) % tileCount,
                y: (head.y + direction.y + tileCount) % tileCount
            };

            const willEat = newHead.x === food.x && newHead.y === food.y;

            // Check collision with self (tail cell is vacated this frame unless growing)
            const bodyToCheck = willEat ? snake : snake.slice(0, -1);
            for (let i = 0; i < bodyToCheck.length; i++) {
                if (newHead.x === bodyToCheck[i].x && newHead.y === bodyToCheck[i].y) {
                    endGame();
                    return;
                }
            }

            // Add new head
            snake.unshift(newHead);

            // Check if food is eaten
            if (willEat) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
                // Increase difficulty
                if (gameSpeed > 50) {
                    gameSpeed -= 1;
                }
            } else {
                // Remove tail if food not eaten
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = '#4fff4f';
                    ctx.shadowColor = '#4fff4f';
                    ctx.shadowBlur = 10;
                } else {
                    // Body
                    ctx.fillStyle = '#3acc3a';
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            ctx.shadowBlur = 0;

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function spawnFood() {
            let newFood;
            let foodOnSnake = true;

            while (foodOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };

                foodOnSnake = snake.some(segment =>
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }

            food = newFood;
        }

        function endGame() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighscore').textContent = highScore;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('gameOverModal').style.display = 'block';
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            food = { x: 15, y: 15 };
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;
            gameRunning = true;
            gamePaused = false;
            document.getElementById('score').textContent = 0;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('gameOverModal').style.display = 'none';
            document.getElementById('pauseBtn').textContent = 'Pause';
        }

        function togglePause() {
            if (gameRunning) {
                gamePaused = !gamePaused;
                document.getElementById('pauseBtn').textContent = gamePaused ? 'Resume' : 'Pause';
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'arrowup':
                case 'w':
                    if (nextDirection.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                        e.preventDefault();
                    }
                    break;
                case 'arrowdown':
                case 's':
                    if (nextDirection.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                        e.preventDefault();
                    }
                    break;
                case 'arrowleft':
                case 'a':
                    if (nextDirection.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                        e.preventDefault();
                    }
                    break;
                case 'arrowright':
                case 'd':
                    if (nextDirection.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                        e.preventDefault();
                    }
                    break;
                case ' ':
                    togglePause();
                    e.preventDefault();
                    break;
            }
        });

        // Start game loop
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
